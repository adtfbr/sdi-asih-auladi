version: "2"
type: frontend
tech_stack:
  - typescript
  - nextjs
  - tailwindcss
  - shadcn-ui
routes:
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: User login page
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page
  - path: /profil
    file: src/app/profil/page.tsx
    auth_required: false
    description: School profile page
  - path: /visi-misi
    file: src/app/visi-misi/page.tsx
    auth_required: false
    description: Vision and mission page
  - path: /berita
    file: src/app/berita/page.tsx
    auth_required: false
    description: News list page
  - path: /galeri
    file: src/app/galeri/page.tsx
    auth_required: false
    description: Gallery page
  - path: /kontak
    file: src/app/kontak/page.tsx
    auth_required: false
    description: Contact page
  - path: /dashboard/admin
    file: src/app/dashboard/admin/page.tsx
    auth_required: true
    description: Admin overview dashboard
  - path: /dashboard/admin/siswa
    file: src/app/dashboard/admin/siswa/page.tsx
    auth_required: true
    description: Admin student management
  - path: /dashboard/admin/guru
    file: src/app/dashboard/admin/guru/page.tsx
    auth_required: true
    description: Admin teacher management
  - path: /dashboard/admin/jadwal
    file: src/app/dashboard/admin/jadwal/page.tsx
    auth_required: true
    description: Admin schedule management
  - path: /dashboard/admin/ppdb
    file: src/app/dashboard/admin/ppdb/page.tsx
    auth_required: true
    description: Admin PPDB verification
  - path: /dashboard/admin/pengumuman
    file: src/app/dashboard/admin/pengumuman/page.tsx
    auth_required: true
    description: Admin announcements management
  - path: /dashboard/guru/jadwal
    file: src/app/dashboard/guru/jadwal/page.tsx
    auth_required: true
    description: Teacher schedule view
  - path: /dashboard/guru/absensi
    file: src/app/dashboard/guru/absensi/page.tsx
    auth_required: true
    description: Teacher attendance management
  - path: /dashboard/guru/nilai
    file: src/app/dashboard/guru/nilai/page.tsx
    auth_required: true
    description: Teacher grade management
  - path: /dashboard/siswa/jadwal
    file: src/app/dashboard/siswa/jadwal/page.tsx
    auth_required: true
    description: Student schedule view
features:
  - name: User Login
    description: Login with email and password credentials for different roles (admin, guru, siswa, wali)
    files:
      - src/app/login/page.tsx
      - src/app/api/auth/login/route.ts
      - src/middleware.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - Redirect to appropriate dashboard based on role
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Admin Student Management
    description: CRUD operations for student data
    files:
      - src/app/dashboard/admin/siswa/page.tsx
      - src/app/api/siswa/route.ts
    entry_route: /dashboard/admin/siswa
    user_interactions:
      - View list of students
      - Click Tambah Siswa to open modal
      - Fill student form and save
      - Search students by name
    api_calls:
      - method: GET
        endpoint: /api/siswa
      - method: POST
        endpoint: /api/siswa
    auth_required: true
  - name: Admin Teacher Management
    description: CRUD operations for teacher data
    files:
      - src/app/dashboard/admin/guru/page.tsx
      - src/app/api/guru/route.ts
    entry_route: /dashboard/admin/guru
    user_interactions:
      - View list of teachers
      - Click Tambah Guru to open modal
      - Fill teacher form and save
      - Edit teacher details
      - Delete teacher
    api_calls:
      - method: GET
        endpoint: /api/guru
      - method: POST
        endpoint: /api/guru
    auth_required: true
  - name: Admin PPDB Verification
    description: View and update status of PPDB applications
    files:
      - src/app/dashboard/admin/ppdb/page.tsx
      - src/app/api/ppdb/[id]/route.ts
    entry_route: /dashboard/admin/ppdb
    user_interactions:
      - View list of applications
      - Filter by status
      - Click Verifikasi to open modal
      - Change status (Accepted/Rejected/Reviewed)
      - Click Simpan Perubahan
    api_calls:
      - method: GET
        endpoint: /api/ppdb
      - method: PUT
        endpoint: /api/ppdb/[id]
    auth_required: true
  - name: Teacher Attendance Management
    description: Record student attendance for a class
    files:
      - src/app/dashboard/guru/absensi/page.tsx
      - src/app/api/absensi/route.ts
    entry_route: /dashboard/guru/absensi
    user_interactions:
      - Select class
      - Select date
      - Change attendance status for students
      - Click Simpan Data Absensi
    api_calls:
      - method: GET
        endpoint: /api/kelas/[id]/siswa
      - method: GET
        endpoint: /api/absensi
      - method: POST
        endpoint: /api/absensi
    auth_required: true
  - name: Teacher Grade Management
    description: Record student grades for a subject
    files:
      - src/app/dashboard/guru/nilai/page.tsx
      - src/app/api/nilai/route.ts
    entry_route: /dashboard/guru/nilai
    user_interactions:
      - Select class and subject
      - Input grade for students
      - Click Simpan Data Nilai
    api_calls:
      - method: GET
        endpoint: /api/kelas/[id]/siswa
      - method: GET
        endpoint: /api/nilai
      - method: POST
        endpoint: /api/nilai
    auth_required: true
known_limitations:
  - issue: Admin Announcement Management is UI-only, not connected to backend API
    location: src/app/dashboard/admin/pengumuman/page.tsx
    impact: Create announcements only modify local state, not persisted
  - issue: Dashboard overviews use dummy or mocked data
    location: src/app/dashboard/admin/page.tsx
    impact: Metrics do not reflect real-time database state
  - issue: Jadwal UI for students and teachers use dummy data
    location: src/app/dashboard/siswa/jadwal/page.tsx
    impact: Schedule is not dynamic
